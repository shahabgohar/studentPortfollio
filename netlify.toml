[build]
  command = "npm run generate:sitemap && NITRO_PRESET=static npm run generate"
  publish = ".output/public"

[build.environment]
  NITRO_PRESET = "static"
  NODE_VERSION = "20"

# Geo-based content hiding at the edge — ENABLED.
# Strips project cards marked hideInPK: true from the /projects HTML for
# visitors in Pakistan (see netlify/edge-functions/geo-hide.ts).
[[edge_functions]]
  function = "geo-hide"
  path = "/projects"

[[edge_functions]]
  function = "geo-hide"
  path = "/projects/"

# Security headers applied to every response.
# CSP is shipped Report-Only first so it cannot break the live site; once the
# browser console/report shows no violations, rename the key to
# "Content-Security-Policy" to enforce it.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy-Report-Only = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://api.iconify.design https://api.simplesvg.com https://api.unisvg.com; frame-src 'self' https://cal.com"
