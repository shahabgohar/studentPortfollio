[build]
  command = "npm run generate:sitemap && NITRO_PRESET=static npm run generate"
  publish = ".output/public"

[build.environment]
  NITRO_PRESET = "static"
  NODE_VERSION = "20"

# Geo-based content hiding at the edge — DISABLED.
